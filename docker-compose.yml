services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: queria
      POSTGRES_USER: queria
      POSTGRES_PASSWORD: queria
    ports:
      - "17675:5432"
    volumes:
      - queria_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queria -d queria"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "17676:6333"
      - "17677:6334"
    volumes:
      - queria_qdrant:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: queria
      MINIO_ROOT_PASSWORD: queria-local-dev-only
    ports:
      - "17678:9000"
      - "17679:9001"
    volumes:
      - queria_minio:/data

volumes:
  queria_postgres:
  queria_qdrant:
  queria_minio:
