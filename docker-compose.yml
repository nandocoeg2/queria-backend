services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: queria
      POSTGRES_USER: queria
      POSTGRES_PASSWORD: queria
    ports:
      - "17675:5432"
    volumes:
      - queria_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queria -d queria"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "17676:6333"
      - "17677:6334"
    volumes:
      - queria_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "perl", "-MIO::Socket::INET", "-e", "exit(0) if IO::Socket::INET->new(PeerAddr => '127.0.0.1', PeerPort => 6333, Timeout => 1); exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: queria
      MINIO_ROOT_PASSWORD: queria-local-dev-only
    ports:
      - "17678:9000"
      - "17679:9001"
    volumes:
      - queria_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  queria-api:
    build: .
    command: queria-api
    ports:
      - "17671:17671"
    env_file:
      - .env
    environment:
      - QUERIA_API_ADDR=0.0.0.0:17671
      - QUERIA_DATABASE_URL=postgres://queria:queria@postgres:5432/queria
      - QUERIA_QDRANT_URL=http://qdrant:6333
      - QUERIA_MINIO_ENDPOINT=http://minio:9000
      - QUERIA_MINIO_ACCESS_KEY=queria
      - QUERIA_MINIO_SECRET_KEY=queria-local-dev-only
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QUERIA_SETUP_TOKEN=${QUERIA_SETUP_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  queria-mcp:
    build: .
    command: queria-mcp
    ports:
      - "17672:17672"
    env_file:
      - .env
    environment:
      - QUERIA_MCP_ADDR=0.0.0.0:17672
      - QUERIA_DATABASE_URL=postgres://queria:queria@postgres:5432/queria
      - QUERIA_QDRANT_URL=http://qdrant:6333
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QUERIA_SETUP_TOKEN=${QUERIA_SETUP_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  queria-worker:
    build:
      context: .
      args:
        QUERIA_SOURCE_COMMIT: ${QUERIA_SOURCE_COMMIT:-unknown}
    command: queria-worker
    ports:
      - "17673:17673"
    env_file:
      - .env
    environment:
      - QUERIA_WORKER_HEALTH_ADDR=0.0.0.0:17673
      - QUERIA_DATABASE_URL=postgres://queria:queria@postgres:5432/queria
      - QUERIA_QDRANT_URL=http://qdrant:6333
      - QUERIA_MINIO_ENDPOINT=http://minio:9000
      - QUERIA_MINIO_ACCESS_KEY=queria
      - QUERIA_MINIO_SECRET_KEY=queria-local-dev-only
      - QUERIA_TRUFFLEHOG_EXECUTABLE=trufflehog
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QUERIA_SETUP_TOKEN=${QUERIA_SETUP_TOKEN}
    volumes:
      - /Users/fernandojulian/project/fjulian/fjulian.me:/Users/fernandojulian/project/fjulian/fjulian.me
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  queria-proxy:
    build: .
    command: queria-proxy
    ports:
      - "17674:17674"
    env_file:
      - .env
    environment:
      - QUERIA_PROXY_ADDR=0.0.0.0:17674
    depends_on:
      - queria-api
    restart: unless-stopped

volumes:
  queria_postgres:
  queria_qdrant:
  queria_minio:
