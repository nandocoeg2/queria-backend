# Build queria-cli binaries and publish to GitHub Releases.
# Trigger: push tag cli-v* (e.g. cli-v0.1.0) or workflow_dispatch.
#
# Note: do NOT use macos-13 — GitHub retired that runner image (jobs queue forever).
# x86_64 macOS builds on macos-14 via Rust target (Apple Silicon host).
name: Release queria-cli

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. cli-v0.1.0). Leave empty to use run id asset prefix only (no GitHub Release)."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE: queria-cli

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Linux arm runners can be unavailable; do not block the release.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            optional: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            optional: true
          # macos-14 is Apple Silicon; both Darwin targets build here (no macos-13).
          - os: macos-14
            target: aarch64-apple-darwin
            optional: false
          - os: macos-14
            target: x86_64-apple-darwin
            optional: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
          workspaces: "."

      - name: Build release binary
        run: cargo build -p queria-cli --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${{ env.PACKAGE }}"
          test -x "$BIN"
          STAGE="dist/${{ env.PACKAGE }}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/${{ env.PACKAGE }}"
          chmod +x "$STAGE/${{ env.PACKAGE }}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#cli-}"
          elif [[ -n "${{ inputs.tag || '' }}" ]]; then
            VER="${{ inputs.tag }}"
            VER="${VER#cli-}"
          else
            VER="0.1.0+${GITHUB_SHA::7}"
          fi
          echo "$VER" > "$STAGE/VERSION"
          (
            cd dist
            tar -czf "${{ env.PACKAGE }}-${{ matrix.target }}.tar.gz" "$(basename "$STAGE")"
            shasum -a 256 "${{ env.PACKAGE }}-${{ matrix.target }}.tar.gz" > "${{ env.PACKAGE }}-${{ matrix.target }}.tar.gz.sha256"
          )
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}-${{ matrix.target }}
          path: |
            dist/${{ env.PACKAGE }}-${{ matrix.target }}.tar.gz
            dist/${{ env.PACKAGE }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Tag push always; dispatch only when tag input is set.
    # Use always() so a failed optional matrix leg does not block publish when required legs OK.
    if: >-
      always() &&
      !cancelled() &&
      (startsWith(github.ref, 'refs/tags/cli-v') ||
       (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: queria-cli-*

      - name: List dist
        run: find dist -type f | sort

      - name: Resolve tag and require core assets
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "No tag for release" >&2
            exit 1
          fi
          shopt -s nullglob
          archives=(dist/queria-cli-*.tar.gz)
          if [[ ${#archives[@]} -lt 1 ]]; then
            echo "No queria-cli archives downloaded" >&2
            exit 1
          fi
          # Required for users / prod docs examples
          for need in \
            queria-cli-aarch64-apple-darwin.tar.gz \
            queria-cli-x86_64-unknown-linux-gnu.tar.gz
          do
            if [[ ! -f "dist/${need}" ]]; then
              echo "Missing required asset: ${need}" >&2
              ls -la dist/ || true
              exit 1
            fi
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#cli-}" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: queria-cli ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## queria-cli ${{ steps.meta.outputs.version }}

            Download the archive for your OS/arch, extract, and put `queria-cli` on your `PATH`.

            ### Install (example: macOS Apple Silicon)

            ```bash
            curl -fsSL -o queria-cli.tar.gz \
              https://github.com/nandocoeg2/queria-backend/releases/download/${{ steps.meta.outputs.tag }}/queria-cli-aarch64-apple-darwin.tar.gz
            tar -xzf queria-cli.tar.gz
            sudo install -m 755 queria-cli-aarch64-apple-darwin/queria-cli /usr/local/bin/queria-cli
            queria-cli index-here --help
            ```

            | Asset | Platform |
            |---|---|
            | `queria-cli-aarch64-apple-darwin.tar.gz` | macOS Apple Silicon |
            | `queria-cli-x86_64-apple-darwin.tar.gz` | macOS Intel |
            | `queria-cli-x86_64-unknown-linux-gnu.tar.gz` | Linux x86_64 |
            | `queria-cli-aarch64-unknown-linux-gnu.tar.gz` | Linux arm64 (when built) |

            Requires a **Custom** agent token with `index_local` for `index-here`. See `docs/runbooks/onboarding.md` (Optional knowledge ingest).

            **Note:** push to `main` does **not** publish this CLI; only tags `cli-v*` (or this workflow with a tag input).
            Do not use `macos-13` runners (retired by GitHub).
          files: |
            dist/queria-cli-*.tar.gz
            dist/queria-cli-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
