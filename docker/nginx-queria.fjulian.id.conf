# Nginx public edge for Queria (matches host pattern used by grafana.fjulian.space).
# Proxies queria.fjulian.id → Caddy container on 127.0.0.1:17674
#
# Install on host:
#   sudo cp docker/nginx-queria.fjulian.id.conf /etc/nginx/sites-available/queria.fjulian.id
#   sudo ln -sf /etc/nginx/sites-available/queria.fjulian.id /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d queria.fjulian.id --non-interactive --agree-tos -m nando@fjulian.id --redirect
#
# Certbot --nginx will add :443 ssl lines and HTTP→HTTPS redirect.

server {
	listen 80;
	listen [::]:80;
	server_name queria.fjulian.id;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}

	location / {
		proxy_pass http://127.0.0.1:17674;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_read_timeout 300s;
		proxy_send_timeout 300s;
		proxy_buffering off;
	}

	access_log /var/log/nginx/queria.access.log;
	error_log  /var/log/nginx/queria.error.log;
}
